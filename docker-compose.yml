version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: always
    command: --innodb-log-file-size=256M --innodb-buffer-pool-size=256M
    environment:
      MYSQL_ROOT_PASSWORD: azerty
      MYSQL_DATABASE: escaperoom_db
      MYSQL_ROOT_HOST: "%"   # ✅ autorise connexions externes
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - escaperoom_net
    healthcheck:
      # ✅ vrai test de connexion SQL
      test: ["CMD", "mysql", "-h", "localhost", "-uroot", "-pazerty", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./escaperoom-spring
    restart: always
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/escaperoom_db?createDatabaseIfNotExist=true&serverTimezone=UTC&autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: azerty
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_MAIL_USERNAME: williamnyacka14@gmail.com
      SPRING_MAIL_PASSWORD: tavzfvnajqjoohzx
    networks:
      - escaperoom_net
    command: ["sh", "-c", "sleep 15 && java -jar app.jar"]  # ✅ laisse MySQL démarrer correctement

  frontend:
    build: ./escaperoom-angular
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - escaperoom_net

volumes:
  mysql_data:

networks:
  escaperoom_net: