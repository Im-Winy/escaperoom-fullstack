server {
  # =========================================
  # 🔥 ÉCOUTE HTTP SUR LE PORT 80
  # =========================================
  listen 80;

  # Nom du serveur (utile pour domaine, sinon localhost ou "_")
  server_name localhost;

  # =========================================
  # 📦 FRONTEND ANGULAR (fichiers statiques)
  # =========================================
  # Dossier où Nginx sert l'application Angular buildée
  root /usr/share/nginx/html;

  # Page d'entrée principale Angular
  index index.html;

  # =========================================
  # 🌐 ROUTING ANGULAR (SPA)
  # =========================================
  location / {
    # Permet de gérer les routes Angular (SPA)
    # Si fichier existe → il est servi
    # Sinon → Angular gère la route côté client
    try_files $uri $uri/ /index.html;
  }

  # =========================================
  # 🔌 API BACKEND SPRING BOOT
  # =========================================
  location /api/ {

    # 👉 Redirection vers le backend Docker
    # "backend" = nom du service dans docker-compose
    proxy_pass http://backend:8089;

    # =========================================
    # 📡 HEADERS IMPORTANT EN PRODUCTION
    # =========================================

    # Conserve le host original (utile pour logs backend)
    proxy_set_header Host $host;

    # IP réelle du client (pas celle de Nginx)
    proxy_set_header X-Real-IP $remote_addr;

    # Chaîne de proxy (utile si plusieurs proxies)
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Protocole utilisé (http ou https)
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}